name: Terraform Cloud Workflow

on:
  schedule:
    - cron: '0 8 * * 1-5'   # 8 AM UTC Monday-Friday
    - cron: '0 18 * * 1-5'  # 6 PM UTC Monday-Friday
  workflow_dispatch:

jobs:
  terraform:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Determine action based on time
        id: check-time
        run: |
          HOUR=$(date +%H)
          if [ $HOUR -ge 8 ] && [ $HOUR -lt 18 ]; then
            echo "action=create" >> $GITHUB_OUTPUT
          else
            echo "action=destroy" >> $GITHUB_OUTPUT
          fi

      - name: Setup Terraform Cloud credentials
        run: |
          cat > $HOME/.terraformrc << EOF
          credentials "app.terraform.io" {
            token = "${{ secrets.TF_API_TOKEN }}"
          }
          EOF

      - name: Upload to Terraform Cloud
        uses: hashicorp/tfc-workflows-github/actions/upload-configuration@v1.0.0
        id: upload
        env:
          TF_CLOUD_ORGANIZATION: ${{ secrets.TF_CLOUD_ORGANIZATION }}
          TF_API_TOKEN: ${{ secrets.TF_API_TOKEN }}
        with:
          workspace: ${{ secrets.TF_WORKSPACE }}
          directory: "."
          speculative: false

      - name: Create Run in Terraform Cloud
        if: steps.upload.outcome == 'success'
        uses: hashicorp/tfc-workflows-github/actions/create-run@v1.0.0
        id: run
        env:
          TF_CLOUD_ORGANIZATION: ${{ secrets.TF_CLOUD_ORGANIZATION }}
          TF_API_TOKEN: ${{ secrets.TF_API_TOKEN }}
        with:
          workspace: ${{ secrets.TF_WORKSPACE }}
          configuration_version: ${{ steps.upload.outputs.configuration_version_id }}
          plan_only: false
          destroy: ${{ steps.check-time.outputs.action == 'destroy' }}
